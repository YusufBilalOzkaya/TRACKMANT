name: TRACKMANT CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-setup:
    runs-on: ubuntu-latest
    name: Backend Validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          playwright install

      - name: Validate Python syntax
        run: |
          cd backend
          python -m py_compile main.py models.py notifier.py scraper.py

      - name: Check environment variables
        run: |
          echo "✓ Backend dependencies validated"
          echo "✓ Make sure to add GitHub Secrets for:"
          echo "  - SMTP_USER"
          echo "  - SMTP_PASS"
          echo "  - SMTP_SERVER (optional, defaults to smtp.gmail.com)"
          echo "  - SMTP_PORT (optional, defaults to 587)"
        continue-on-error: true

  frontend-setup:
    runs-on: ubuntu-latest
    name: Frontend Build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint src/ --ext .js,.jsx || true
        continue-on-error: true

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  security-check:
    runs-on: ubuntu-latest
    name: Security Validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          echo "✓ Checking .env is in .gitignore..."
          grep -q "^\.env$" .gitignore && echo "✓ .env is properly ignored" || echo "✗ .env not in .gitignore"
          
          echo "✓ Checking for hardcoded credentials..."
          ! grep -r "SMTP_PASS=" backend/ frontend/ 2>/dev/null | grep -v ".env.example" && echo "✓ No hardcoded credentials found" || echo "⚠ Check credentials in code"
        continue-on-error: true

      - name: Notify secrets setup
        run: |
          echo "📋 GitHub Secrets Setup Required:"
          echo "Go to: Settings → Secrets and Variables → Actions"
          echo ""
          echo "Add these secrets:"
          echo "  1. SMTP_USER = your-email@gmail.com"
          echo "  2. SMTP_PASS = your-google-app-password"
          echo "  3. SMTP_SERVER = smtp.gmail.com (optional)"
          echo "  4. SMTP_PORT = 587 (optional)"
