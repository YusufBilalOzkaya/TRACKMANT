name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Application
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run deployment checks
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          echo "✓ Verifying SMTP configuration..."
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASS" ]; then
            echo "❌ ERROR: SMTP credentials not set in GitHub Secrets!"
            exit 1
          fi
          echo "✓ Credentials loaded from GitHub Secrets"
          echo "✓ Ready for deployment to ${{ github.event.inputs.environment || 'production' }}"

      - name: Create deployment summary
        run: |
          echo "📦 Deployment Information:"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo ""
          echo "✅ All checks passed!"
